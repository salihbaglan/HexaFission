<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
		<title>Hex 2048</title>
		<style>
/* CUSTOM SPLAY LOADER - UNITY STYLE */
html, body {
	margin: 0;
	padding: 0;
	width: 100%;
	height: 100%;
	overflow: hidden;
	background-color: #000000;
	-webkit-user-select: none;
	-moz-user-select: none;
	-ms-user-select: none;
	user-select: none;
	-webkit-touch-callout: none;
}
img {
	-webkit-user-drag: none;
	user-drag: none;
}
#status {
	position: absolute;
	left: 0; right: 0; top: 0; bottom: 0;
	background: linear-gradient(135deg, #051937, #004d7a, #008793);
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	z-index: 9999;
	transition: opacity 0.5s ease;
}
#status-splash {
	position: static;
	max-width: 160px;
	max-height: 160px;
	margin: 0;
	width: 100%;
	height: 100%;
	object-fit: contain;
}
#status-progress {
	position: static;
	width: 320px;
	max-width: 80%;
	height: 22px;
	margin-top: 35px;
	appearance: none;
	-webkit-appearance: none;
	border: none;
	background-color: rgba(0, 0, 0, 0.4);
	border-radius: 12px;
	padding: 0;
}
#status-progress::-webkit-progress-bar { background-color: transparent; }
#status-progress::-webkit-progress-value { background-color: #ffffff; border-radius: 12px; transition: width 0.1s linear; }
#status-progress::-moz-progress-bar { background-color: #ffffff; border-radius: 12px; }

#game-iframe {
	width: 100%;
	height: 100%;
	border: none;
	display: none;
}
		</style>
	</head>
	<body>
		<div id="status">
			<img id="status-splash" src="SPlay-Loader/splayLogo.png" alt="SPlay Logo">
			<progress id="status-progress" value="0" max="100"></progress>
		</div>

		<!-- Game loaded here -->
		<iframe id="game-iframe"></iframe>

		<script>
		(function () {
			// Prevent right-click menu
			document.addEventListener('contextmenu', e => e.preventDefault());

			const statusOverlay = document.getElementById('status');
			const statusProgress = document.getElementById('status-progress');
			const iframe = document.getElementById('game-iframe');

			let progress = 0;
			// Fake progress loading
			const progressInterval = setInterval(() => {
				progress += Math.random() * 8; // Random increments
				if (progress >= 100) {
					progress = 100;
					statusProgress.value = progress;
					clearInterval(progressInterval);
					
					// Yükleme tamamlandığında iframe'e oyunu yükle ve göster
					iframe.src = 'game.html';
					iframe.style.display = 'block';
					setTimeout(() => {
						statusOverlay.style.opacity = '0';
						setTimeout(() => statusOverlay.remove(), 500);
					}, 300);
				} else {
					statusProgress.value = progress;
				}
			}, 80);
		})();
		</script>
	</body>
</html>
