<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Hex 2048</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/loading.css">
  <link rel="stylesheet" href="css/modals.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

  <!-- LOADING SCREEN -->
  <div id="loading-screen">
    <div id="loading-hex-container"></div>
    <div class="loading-content">
      <img src="assets/images/Loading/GameName.png" alt="Hexa Fission" class="loading-logo">
    </div>
    <div id="loading-text-container">
      <p id="loading-text">Loading...</p>
    </div>
  </div>
  <script src="js/loading.js"></script>

  <div id="ui-panel">
    <!-- TOP BAR -->
    <div id="topbar">
    <div class="scores-container">
      <div class="score-box" id="best-score-box">
        <img id="crown-img" src="" alt="crown">
        <span id="best-val">0</span>
      </div>
    </div>
    <button id="settings-btn">
      <img src="assets/images/settings.png" alt="settings">
    </button>
  </div>

  <!-- TRAY -->
  <div id="tray">
    <div class="tray-slot" id="slot-0"></div>
    <div class="tray-slot" id="slot-1"></div>
    <div class="tray-slot" id="slot-2"></div>
  </div>

  <!-- ITEMS PANEL -->
  <div id="items-panel">
    <div class="item-btn" id="item-change-btn">
      <img src="assets/images/changeHex.png" alt="change">
      <span class="item-count" id="count-change">5</span>
    </div>
    <div class="item-btn" id="item-remove-btn">
      <img src="assets/images/removeHex.png" alt="remove">
      <span class="item-count" id="count-remove">5</span>
    </div>
  </div>
  </div>

  <!-- ITEM FOCUS OVERLAY -->
  <div id="item-focus-overlay" style="display:none;">
    <div id="item-focus-text"></div>
  </div>

  <!-- GRID -->
  <div id="grid-container">
    <div class="score-box" id="current-score-box">
      <img src="assets/images/Score_healt.png" alt="heart">
      <img src="assets/images/Score_helatOutline.png" id="score-heart-outline" alt="heart outline" style="display: none;">
      <span id="score-display">0</span>
    </div>
    <div id="hex-grid"></div>
  </div>

  <!-- DRAG GHOST -->
  <div id="drag-ghost"></div>

  <!-- SETTINGS -->
  <div id="settings-panel">
    <button id="close-settings">✕</button>
    <h3>Settings</h3>
    <div class="setting-row">
      <span>Music</span>
      <div class="toggle on" id="toggle-music"></div>
    </div>
    <div class="setting-row">
      <span>Sound Effects</span>
      <div class="toggle on" id="toggle-sfx"></div>
    </div>
    <div class="setting-row">
      <span>Vibration</span>
      <div class="toggle on" id="toggle-vib"></div>
    </div>
    <br>
    <button class="btn btn-primary" id="restart-btn" style="width:100%;margin-top:10px">New Game</button>
  </div>

  <!-- AD OFFER MODAL -->
  <div id="ad-offer-modal">
    <div id="ad-modal">
      <h2>OUT OF USES</h2>
      <p id="ad-offer-text">Watch a short ad to get +3 free uses.</p>
      <div style="display:flex; gap:12px; justify-content:center; margin-top:24px;">
        <button class="btn" id="ad-offer-cancel" style="background:rgba(255,255,255,0.15); color:white; flex:1;">Cancel</button>
        <button class="btn btn-primary" id="ad-offer-watch" style="flex:1;">Watch Ad</button>
      </div>
    </div>
  </div>

  <!-- OVERLAY -->
  <div id="overlay">
    <div id="modal">
      <h2>GAME OVER!</h2>
      <div class="modal-score" id="modal-score">0</div>
      <p>Board is full, no more moves.</p>
      <button class="btn btn-primary" id="play-again-btn">Play Again</button>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="js/splay-bridge.js"></script>
  <script type="module" src="js/game.js"></script>

</body>

</html>
